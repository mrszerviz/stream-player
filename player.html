<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Stream Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; font-family: Arial, sans-serif; width: 400px; }

  #player-box {
    background: rgba(0,0,0,0.85);
    border-radius: 12px;
    padding: 12px;
    color: #fff;
  }

  #yt-player { width: 100%; height: 220px; border-radius: 8px; display: none; }

  #info { margin: 8px 0 6px; font-size: 13px; color: #ccc; min-height: 18px; }
  #title { font-size: 15px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  #controls { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  button { background: #ff0000; border: none; color: #fff; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  button:hover { background: #cc0000; }
  #skip-btn { background: #555; }
  #skip-btn:hover { background: #333; }

  #vol-wrap { display: flex; align-items: center; gap: 6px; flex: 1; }
  #vol-wrap label { font-size: 12px; color: #aaa; white-space: nowrap; }
  input[type=range] { flex: 1; accent-color: #ff0000; }

  #queue { margin-top: 10px; max-height: 120px; overflow-y: auto; }
  #queue h4 { font-size: 12px; color: #888; margin-bottom: 4px; }
  .queue-item { font-size: 12px; padding: 3px 6px; background: rgba(255,255,255,0.07); border-radius: 4px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .queue-item:first-child { color: #4fc; }

  #no-song { text-align: center; padding: 20px; color: #666; font-size: 13px; }
</style>
</head>
<body>
<div id="player-box">
  <div id="yt-player-wrap">
    <div id="yt-player"></div>
  </div>
  <div id="no-song">Nincs dal a sorban...</div>
  <div id="title"></div>
  <div id="info"></div>
  <div id="controls" style="display:none">
    <button id="play-btn" onclick="togglePlay()">⏸</button>
    <button id="skip-btn" onclick="skipSong()">⏭ Skip</button>
    <div id="vol-wrap">
      <label>🔊</label>
      <input type="range" id="vol" min="0" max="100" value="80" oninput="setVol(this.value)">
      <label id="vol-label">80%</label>
    </div>
  </div>
  <div id="queue"><h4>Sor:</h4><div id="queue-list"></div></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getDatabase, ref, onValue, remove, set, get } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC_Fo6r0oQ8XjOuZoY4yXU8EwQ_glfEHlc",
    authDomain: "songrequest-aa576.firebaseapp.com",
    databaseURL: "https://songrequest-aa576-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "songrequest-aa576",
    storageBucket: "songrequest-aa576.firebasestorage.app",
    messagingSenderId: "917847441742",
    appId: "1:917847441742:web:6ab5f8008a8d8cbebade1f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const queueRef = ref(db, 'queue');

  let player = null;
  let currentKey = null;
  let queue = [];
  let ytReady = false;

  window.onYouTubeIframeAPIReady = () => {
    ytReady = true;
    player = new YT.Player('yt-player', {
      height: '220', width: '100%',
      playerVars: { autoplay: 1, controls: 0, mute: 1 },
      events: {
        onReady: () => { player.unMute(); player.setVolume(80); },
        onStateChange: (e) => {
          if (e.data === YT.PlayerState.ENDED) skipSong();
          if (e.data === YT.PlayerState.PLAYING) {
            document.getElementById('play-btn').textContent = '⏸';
          } else if (e.data === YT.PlayerState.PAUSED) {
            document.getElementById('play-btn').textContent = '▶';
          }
        }
      }
    });
    if (queue.length > 0) playFirst();
  };

  onValue(queueRef, (snap) => {
    const data = snap.val();
    queue = data ? Object.entries(data).sort((a,b) => a[1].ts - b[1].ts) : [];
    renderQueue();
    if (queue.length > 0 && !currentKey) {
      if (ytReady) playFirst();
    } else if (queue.length === 0) {
      currentKey = null;
      document.getElementById('no-song').style.display = 'block';
      document.getElementById('yt-player').style.display = 'none';
      document.getElementById('controls').style.display = 'none';
      document.getElementById('title').textContent = '';
      document.getElementById('info').textContent = '';
      if (player) player.stopVideo();
    }
  });

  function playFirst() {
    if (!queue.length || !player) return;
    const [key, song] = queue[0];
    currentKey = key;
    player.loadVideoById(song.videoId);
    player.unMute();
    player.setVolume(parseInt(document.getElementById('vol').value));
    document.getElementById('title').textContent = song.title;
    document.getElementById('info').textContent = '🎵 Kérte: ' + song.requester;
    document.getElementById('no-song').style.display = 'none';
    document.getElementById('yt-player').style.display = 'block';
    document.getElementById('controls').style.display = 'flex';
  }

  function renderQueue() {
    const list = document.getElementById('queue-list');
    list.innerHTML = '';
    queue.forEach(([k, s], i) => {
      const d = document.createElement('div');
      d.className = 'queue-item';
      d.textContent = (i === 0 ? '▶ ' : (i+1)+'. ') + s.title + ' — ' + s.requester;
      list.appendChild(d);
    });
  }

  window.skipSong = async () => {
    if (!currentKey) return;
    await remove(ref(db, 'queue/' + currentKey));
    currentKey = null;
    if (queue.length > 1) playFirst();
  };

  window.togglePlay = () => {
    if (!player) return;
    const state = player.getPlayerState();
    if (state === YT.PlayerState.PLAYING) player.pauseVideo();
    else player.playVideo();
  };

  window.setVol = (v) => {
    if (player) player.setVolume(parseInt(v));
    document.getElementById('vol-label').textContent = v + '%';
  };
</script>
</body>
</html>
